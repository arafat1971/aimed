name: medai
description: MedAI - Your intelligent medicine tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^17.3.0
  
  # HTTP / API
  http: ^1.2.0
  
  # Fonts
  google_fonts: ^8.1.0
  
  # Image picker (camera + gallery)
  image_picker: ^1.0.7
  
  # QR Code generation
  qr_flutter: ^4.1.0
  # Local notifications
  flutter_local_notifications: ^22.0.1
  
  # Date/time
  intl: ^0.20.2
  
  # File handling
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Share
  share_plus: ^12.0.1
  
  # UUID for IDs
  uuid: ^4.3.3
  
  # Animations
  flutter_animate: ^4.5.0
  rive: ^0.13.20
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  
  cupertino_icons: ^1.0.2
  timezone: ^0.11.0
  health: ^13.3.1
  permission_handler: ^12.0.3

  # ── Firebase ────────────────────────────────────────────────────────
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  camera: ^0.12.0
  image: ^4.5.0
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^6.0.0
  logger: ^2.6.2
  flutter_image_compress: ^2.4.0
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_remote_config: ^6.1.0
  firebase_performance: ^0.11.4+3
  firebase_app_check: ^0.4.5
  pdf: ^3.11.3
  printing: ^5.14.2
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  flutter_timezone: ^5.0.0
  mobile_scanner: ^7.2.0
  local_auth: ^3.0.1
  audioplayers: ^6.6.0
  flutter_dynamic_icon_plus: ^1.4.0
  purchases_flutter: ^10.2.3
  in_app_review: ^2.0.9
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  confetti: ^0.8.0
  live_activities: ^2.4.3
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  config:
    enable-swift-package-manager: false

  assets:
    - .env
    - assets/images/
    - assets/audio/
    - assets/rive/
    - assets/lottie/
    - assets/illustrations/
    - assets/icons/
    - assets/mascots/


